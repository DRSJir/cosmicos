<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Densidad de Defectos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>

<div id="sidebar-container"></div>

<main class="main-content">
    <div class="container-card">
        <header class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
            <div>
                <h1 class="h4 mb-1">Densidad de Defectos</h1>
                <small class="text-secondary">Métrica: <b>Defectos por KLOC (1,000 líneas)</b></small>
            </div>

            <div class="d-flex flex-column align-items-end gap-2">
                <span id="promedio-badge" class="badge rounded-pill text-bg-secondary p-2 px-3">
                    Calculando...
                </span>

                <span id="status-badge" class="badge rounded-pill p-2 px-3">
                    Esperando...
                </span>
            </div>
        </header>

        <div class="chart-wrapper bg-dark p-3 rounded-3 mb-4">
            <div id="density-chart"></div>
        </div>

        <footer class="mt-5 pt-4 border-top border-secondary">
            <div class="row align-items-center">
                <div class="col-md-6 mb-3 mb-md-0">
                    <h5 class="h6 mb-1 text-white">Cargar Análisis Externo</h5>
                    <p class="small text-secondary mb-0">
                        Sube un archivo <code>.json</code> para procesar métricas mediante el motor Java.
                    </p>
                </div>
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="file"
                               class="form-control form-control-sm bg-dark text-secondary border-secondary"
                               id="input-json"
                               accept=".json">
                        <button class="btn btn-primary btn-sm" type="button" id="btn-cargar">
                            <i class="bi bi-cloud-upload me-1"></i> Procesar en Java
                        </button>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/graficaDensidad.js"></script>

<script>
    // Función para resaltar el enlace activo en la sidebar
    function resaltarEnlaceActivo() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('#sidebar .nav-link');
        navLinks.forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }

    // Cargar Sidebar y ejecutar resaltado
    fetch('/barraLateral.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('sidebar-container').innerHTML = data;
            resaltarEnlaceActivo();
        })
        .catch(err => console.error("Error cargando la barra lateral:", err));
</script>
</body>
</html>
