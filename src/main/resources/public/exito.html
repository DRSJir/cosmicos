<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
		<meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
		<title>Tasa de Exito</title>
		
		<!--Bootstrap-->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
		
		<!--CSS-->
		<link rel="stylesheet" href="/css/estilos.css">
		
		<!--Libreria de graficas-->
		<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>	
	</head>

	<body>
		<!--Sidebar-->
		<div id="sidebar-container"></div>
		
		<!--Contenido-->
		<main class="p-4">
			
			<div class="d-flex justify-content-between align-items-center mb-3">
			    <h1 class="text-light">Tasa de exito</h1>
			    <button id="btnDescargar" class="btn btn-outline-light">
			        Descargar PNG
			    </button>
			</div>
			
			<!--Indicador general (KPI)-->
			<div id="indicador" class="ms-1 fs-4 fw-bold mb-3"></div>
			
			<!--Permite seleccionar un archivo .json-->
			<label class="btn btn-outline-light mb-3">
			    Cargar JSON
			    <input type="file" id="inputJson" accept=".json" hidden>
			</label>
			
			<!--Aqui metemos la grafica-->
			<div id="main-chart"></div>
			
			<!--Interpretacion de indicadores-->
			<div style="margin-top: 10px; text-align:center;">
			  <span style="color:#28a745; font-weight:bold;">● Bueno</span>
			  <span style="margin-left:15px; color:#ffc107; font-weight:bold;">● Riesgo</span>
			  <span style="margin-left:15px; color:#dc3545; font-weight:bold;">● Bajo</span>
			</div>
			
		</main>
		
		<!--JS-->
		<script src="/js/graficaExito.js"></script>
		
	</body>

</html>
