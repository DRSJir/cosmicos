<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasa de Exito</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/estilos.css">

    <!-- Librería de gráficas -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Contenido -->
    <main class="p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="text-light">Tasa de éxito</h1>

            <button id="btnDescargar" class="btn btn-outline-light">
                Descargar PNG
            </button>
        </div>

        <div id="indicador" class="ms-1 fs-4 fw-bold mb-3"></div>

        <label class="btn btn-outline-light mb-3">
            Cargar JSON
            <input type="file" id="inputJson" accept=".json" hidden>
        </label>

        <div id="main-chart"></div>

        <div style="margin-top:10px; text-align:center;">
            <span style="color:#28a745; font-weight:bold;">● Bueno</span>

            <span style="margin-left:15px; color:#ffc107; font-weight:bold;">
                ● Riesgo
            </span>

            <span style="margin-left:15px; color:#dc3545; font-weight:bold;">
                ● Bajo
            </span>
        </div>

    </main>

    <script src="/js/graficaExito.js"></script>

    <script>
        function resaltarEnlaceActivo() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('#sidebar .nav-link');

            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

        fetch('/barraLateral.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                resaltarEnlaceActivo();
            })
            .catch(err => console.error("Error cargando la barra lateral:", err));
    </script>

</body>

</html>
