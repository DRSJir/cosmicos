<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javalin Interactivo Dashboard</title>
    <!-- Agregamos Bootstrap para que la barra lateral se vea bien -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: white;
            margin: 0;
            display: flex; /* Crucial para alinear la barra lateral */
            min-height: 100vh;
        }

        /* Contenedor del contenido principal para que no se pegue a la barra */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }

        h1 { text-align: center; margin-bottom: 30px; font-weight: 300; }

        /* Contenedor Grid Principal */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Estilo de cada Tarjeta */
        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            transition: transform 0.2s;
            position: relative;
        }

        .chart-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .card-title { margin: 0; font-size: 1.1rem; font-weight: 600; color: #eee; }

        .btn-info {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s, color 0.2s;
        }

        .btn-info:hover { background: #fff; color: #1a1a2e; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: #252542; padding: 30px; border-radius: 15px;
            width: 90%; max-width: 500px; border: 1px solid rgba(255,255,255,0.2);
        }
        .spec-label { font-weight: bold; color: #00E396; margin-right: 5px; }

    </style>
</head>
<body>

    <!-- 1. Contenedor de la barra lateral -->
    <div id="sidebar-container"></div>

    <!-- 2. Envolvemos todo el contenido en una etiqueta main -->
    <main class="main-content">
        <h1>Panel de Control</h1>

        <div class="dashboard-grid">
            <div class="chart-card">
                <div class="card-header">
                    <h3 class="card-title">Sesiones de Usuario (Área)</h3>
                    <button class="btn-info" onclick="openModal('sesiones')">Ver Specs</button>
                </div>
                <div id="chart-line"></div>
            </div>


			<div class="chart-card">
			    <div class="card-header">
			        <h3 class="card-title">Desviación de Esfuerzo (API)</h3>
			        <span id="status-badge" class="badge bg-primary">Sincronizando...</span>
			    </div>
			 <div id="main-chart"></div> </div>
			
        </div>
    </main>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 id="modalTitle" class="text-white">Especificaciones</h5>
                <button class="btn-close btn-close-white" onclick="closeModal()"></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // Cargar barra lateral
        fetch('/barraLateral.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
            });

        /* --- CONFIGURACIÓN DE APEXCHARTS --- */
        const commonOptions = {
            chart: { foreColor: '#ccc', toolbar: { show: false }, fontFamily: 'Segoe UI, sans-serif' },
            theme: { mode: 'dark' },
            dataLabels: { enabled: false },
            stroke: { curve: 'smooth', width: 2 }
        };

        new ApexCharts(document.querySelector("#chart-line"), {
            ...commonOptions,
            series: [{ name: "Sesiones Activas", data: [31, 40, 28, 51, 42, 109, 100] }],
            chart: { ...commonOptions.chart, type: 'area', height: 250 },
            colors: ['#764ba2'],
            xaxis: { categories: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'] }
        }).render();



        /* --- LÓGICA MODAL --- */
        const chartSpecs = {
            'sesiones': { title: 'Sesiones', content: '<span class="spec-label">Fuente:</span> Javalin Auth' }

        };

        function openModal(chartType) {
            const data = chartSpecs[chartType];
            if (data) {
                document.getElementById('modalTitle').innerText = data.title;
                document.getElementById('modalBody').innerHTML = data.content;
                document.getElementById('modalOverlay').classList.add('active');
            }
        }
		
		
		// ... (Tus otras gráficas: chart-line, chart-bar, chart-donut) ...

		// 4. Gráfica Dinámica de Desviación (Desde API)
		fetch('/api/desviacion')
		    .then(res => res.json())
		    .then(data => {
		        // Actualizar el badge de estado
		        const badge = document.getElementById('status-badge');
		        if (badge) {
		            badge.innerText = `${data.umbral} (${data.porcentaje}%)`;
		            // Si usas clases de Bootstrap podrías mapearlas así:
		            badge.className = `badge bg-${data.umbral === 'Estable' ? 'success' : 'warning'}`;
		        }

		        const options = {
		            series: data.series,
		            chart: { 
		                type: 'area', 
		                height: 250, // Ajustado para que encaje con las otras
		                toolbar: { show: false }, 
		                foreColor: '#ccc' 
		            },
		            colors: ['#6366f1', '#10b981'],
		            stroke: { curve: 'smooth', width: 2 },
		            xaxis: { categories: data.categories },
		            theme: { mode: 'dark' },
		            tooltip: { theme: 'dark' }
		        };

		        new ApexCharts(document.querySelector("#main-chart"), options).render();
		    })
		    .catch(err => console.error("Error cargando desviación:", err));

        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    </script>
</body>
</html>
