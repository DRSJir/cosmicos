<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Desviación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
	<link rel="stylesheet" href="/css/estiloDesviacion.css">
</head>
<body>

    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="container-card">
            <header class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
                <div>
                    <h1 class="h4 mb-1">Desviación de Esfuerzo</h1>
                </div>
				<div class="d-flex align-items-center gap-3">
				    <input type="file" id="upload-json" accept=".json" style="display: none;">
				    <button onclick="document.getElementById('upload-json').click()" class="btn btn-outline-primary btn-sm">
				        <i class="bi bi-upload me-1"></i> Importar Datos
				    </button>
				    <div id="status-badge" class="status-badge">Sincronizando...</div>
				</div>
                
            </header>

            <div id="main-chart"></div>
			
			<div id="interpretation-container" class="mt-4 p-3 rounded-3 bg-dark border border-secondary shadow-sm" style="display: none;">
			    <h5 class="text-light mb-2"><i class="bi bi-info-circle me-2"></i>Análisis de Desviación</h5>
			    <p id="interpretation-text" class="text-secondary mb-0"></p>
			</div>
        </div>
    </main>

    <script src="/js/graficaDesviacion.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
